app_id = "hermes-opt"
description = "Generated by ORE CLI"
version = "1.0.0"

[privacy]
enforce_pii_redaction = true

[resources]
allowed_models = ["llama3.2:1b"]
max_tokens_per_minute = 10000
gpu_priority = "normal"
json_history = true
stateful_paging = true

[memory_limits]
max_json_tokens = 8192
max_kv_cache_mb = 1024
auto_summarize_on_cap = true

[ipc]
allowed_agent_targets = ["ricky"]
allowed_semantic_pipes = ["morty"]
semantic_persistence = true

